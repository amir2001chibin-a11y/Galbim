<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>منیم بالام ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff4fa3;
    --purple:#9d4bff;
    --red:#ff3b3b;
    --yellow:#ffd95c;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    background:#03020a;
    overflow:hidden;
    font-family:'Vazirmatn',sans-serif;
    color:#fff;
    -webkit-tap-highlight-color:transparent;
  }
  canvas#galaxy{
    position:fixed;inset:0;z-index:1;display:block;touch-action:none;
  }
  /* ---------- neon background line art ---------- */
  #neonBg{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    opacity:.55;
  }
  .neonShape{
    filter:drop-shadow(0 0 6px currentColor) drop-shadow(0 0 14px currentColor);
    animation:neonCycle 9s linear infinite;
  }
  .neonShape.delay1{animation-delay:-2s;}
  .neonShape.delay2{animation-delay:-4.5s;}
  .neonShape.delay3{animation-delay:-6.5s;}
  @keyframes neonCycle{
    0%{filter:drop-shadow(0 0 6px #ff4fa3) drop-shadow(0 0 14px #ff4fa3);color:#ff4fa3;}
    25%{filter:drop-shadow(0 0 6px #9d4bff) drop-shadow(0 0 14px #9d4bff);color:#9d4bff;}
    50%{filter:drop-shadow(0 0 6px #4fd1ff) drop-shadow(0 0 14px #4fd1ff);color:#4fd1ff;}
    75%{filter:drop-shadow(0 0 6px #ff3b3b) drop-shadow(0 0 14px #ff3b3b);color:#ff3b3b;}
    100%{filter:drop-shadow(0 0 6px #ff4fa3) drop-shadow(0 0 14px #ff4fa3);color:#ff4fa3;}
  }

  /* ---------- yellow heart shooting star ---------- */
  .heartComet{
    position:fixed;width:34px;height:30px;z-index:3;pointer-events:none;
    left:-10vw;top:108vh;
    animation:shootHeart 8s linear infinite;
    filter:drop-shadow(0 0 6px #ffd95c) drop-shadow(0 0 16px #ffd95c);
  }
  .heartComet.h2{animation-delay:4s;opacity:.85;transform:scale(.7);}
  .heartComet svg{width:100%;height:100%;display:block;}
  .heartComet::before{
    content:'';position:absolute;top:50%;right:100%;width:120px;height:2px;
    background:linear-gradient(to left, rgba(255,217,92,.9), transparent);
    transform:translateY(-50%) rotate(20deg);
  }
  @keyframes shootHeart{
    0%{left:-10vw;top:108vh;transform:rotate(0deg) scale(.5);opacity:0;}
    8%{opacity:1;}
    50%{left:50vw;top:46vh;transform:rotate(15deg) scale(.9);}
    92%{opacity:1;}
    100%{left:112vw;top:-12vh;transform:rotate(28deg) scale(1.05);opacity:0;}
  }

  /* ---------- top "I love you" heart with fireworks ---------- */
  #topHeart{
    position:fixed;top:3.5vh;left:50%;transform:translateX(-50%);
    width:min(46vw,230px);height:min(40vw,200px);z-index:5;pointer-events:none;
    text-align:center;
  }
  #topHeart .heartOutline{
    width:100%;height:80%;
    filter:drop-shadow(0 0 8px #ff3b3b) drop-shadow(0 0 22px #ff3b3b) drop-shadow(0 0 40px #ff4fa3);
  }
  #topHeart canvas{
    position:absolute;inset:0;width:100%;height:80%;
    -webkit-mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 29"><path d="M16 27.5 C16 27.5 2 18 2 9.5 C2 4.5 5.7 1.5 9.8 1.5 C12.7 1.5 14.9 3.1 16 5.4 C17.1 3.1 19.3 1.5 22.2 1.5 C26.3 1.5 30 4.5 30 9.5 C30 18 16 27.5 16 27.5 Z" fill="white"/></svg>');
    mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 29"><path d="M16 27.5 C16 27.5 2 18 2 9.5 C2 4.5 5.7 1.5 9.8 1.5 C12.7 1.5 14.9 3.1 16 5.4 C17.1 3.1 19.3 1.5 22.2 1.5 C26.3 1.5 30 4.5 30 9.5 C30 18 16 27.5 16 27.5 Z" fill="white"/></svg>');
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
  }
  #topHeart .loveText{
    margin-top:4px;font-family:'Pacifico',cursive;font-size:clamp(16px,4vw,22px);
    color:#fff; text-shadow:0 0 6px #ff3b3b,0 0 16px #ff4fa3,0 0 26px #9d4bff;
    letter-spacing:1px;
  }

  /* ---------- comet messages ---------- */
  #messagesLayer{position:fixed;inset:0;z-index:6;pointer-events:none;overflow:hidden;}
  .comet{
    position:absolute;width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#ffd9f0 40%,rgba(255,217,240,0) 75%);
    box-shadow:0 0 10px 3px #fff,0 0 24px 8px #ff8fcf;
    transition:left 2.6s cubic-bezier(.3,.6,.2,1), top 2.6s cubic-bezier(.3,.6,.2,1), opacity .8s;
    opacity:0;
  }
  .comet::after{
    content:'';position:absolute;top:50%;right:100%;width:90px;height:3px;border-radius:3px;
    background:linear-gradient(to left, rgba(255,143,207,.9), transparent);
    transform:translateY(-50%);
  }
  .comet-bubble{
    position:absolute;max-width:78vw;padding:14px 20px;border-radius:20px;
    background:rgba(25,10,35,.72);border:1px solid rgba(255,143,207,.55);
    box-shadow:0 0 24px rgba(255,79,163,.45), inset 0 0 18px rgba(157,75,255,.25);
    backdrop-filter:blur(3px);
    font-size:clamp(16px,4.2vw,20px);font-weight:600;text-align:center;
    color:#ffe9f6;opacity:0;transition:opacity .7s, transform .7s;
    transform:translate(-50%,-50%) scale(.85);
  }
  .comet-bubble.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

  /* ---------- start overlay ---------- */
  #startOverlay{
    position:fixed;inset:0;z-index:50;background:rgba(2,1,8,.92);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
    text-align:center;padding:20px;
  }
  #startOverlay h1{
    font-family:'Pacifico',cursive;font-size:clamp(22px,6vw,34px);
    color:#fff;text-shadow:0 0 10px #ff4fa3,0 0 24px #9d4bff;margin:0;
  }
  #startBtn{
    padding:14px 46px;border-radius:40px;border:none;cursor:pointer;
    background:linear-gradient(45deg,#ff4fa3,#9d4bff);color:#fff;
    font-family:'Vazirmatn',sans-serif;font-weight:700;font-size:18px;
    box-shadow:0 0 26px rgba(255,79,163,.7);
  }
  #hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:6;
    font-size:12px;color:rgba(255,255,255,.45);pointer-events:none;}
</style>
</head>
<body>

  <div id="startOverlay">
    <h1>منیم بالام، امیر سنه قوربان ❤️</h1>
    <button id="startBtn">شروع کن 💖</button>
  </div>

  <audio id="bgm" src="music.mp3" loop preload="auto"></audio>

  <!-- neon decorative background -->
  <svg id="neonBg" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width="1.6">
    <g class="neonShape delay1" stroke="currentColor">
      <path d="M60 120 C40 90 40 60 65 50 C85 42 100 60 100 75 C100 60 115 42 135 50 C160 60 160 90 140 120 C125 140 100 158 100 158 C100 158 75 140 60 120 Z"/>
    </g>
    <g class="neonShape delay2" stroke="currentColor">
      <path d="M330 260 q-18 -22 -2 -34 q14 -10 26 4 q4 -16 22 -16 q22 0 18 22 q-3 16 -22 30 q-15 11 -22 18 q-9 -10 -20 -24 Z"/>
      <path d="M338 250 q10 -14 0 -26" />
      <path d="M338 250 q12 8 26 4" />
    </g>
    <g class="neonShape delay3" stroke="currentColor">
      <path d="M70 560 C50 530 50 500 75 490 C95 482 110 500 110 515 C110 500 125 482 145 490 C170 500 170 530 150 560 C135 580 110 598 110 598 C110 598 85 580 70 560 Z"/>
    </g>
    <g class="neonShape" stroke="currentColor">
      <path d="M310 680 q-16 -20 -2 -32 q13 -10 24 3 q3 -15 20 -15 q20 0 17 21 q-3 14 -20 27 q-14 10 -20 16 q-9 -9 -19 -20 Z"/>
    </g>
  </svg>

  <div class="heartComet"><svg viewBox="0 0 32 29"><path d="M16 27.5 C16 27.5 2 18 2 9.5 C2 4.5 5.7 1.5 9.8 1.5 C12.7 1.5 14.9 3.1 16 5.4 C17.1 3.1 19.3 1.5 22.2 1.5 C26.3 1.5 30 4.5 30 9.5 C30 18 16 27.5 16 27.5 Z" fill="none" stroke="#ffd95c" stroke-width="2"/></svg></div>
  <div class="heartComet h2"><svg viewBox="0 0 32 29"><path d="M16 27.5 C16 27.5 2 18 2 9.5 C2 4.5 5.7 1.5 9.8 1.5 C12.7 1.5 14.9 3.1 16 5.4 C17.1 3.1 19.3 1.5 22.2 1.5 C26.3 1.5 30 4.5 30 9.5 C30 18 16 27.5 16 27.5 Z" fill="none" stroke="#ffd95c" stroke-width="2"/></svg></div>

  <canvas id="galaxy"></canvas>

  <div id="topHeart">
    <svg class="heartOutline" viewBox="0 0 32 29">
      <path d="M16 27.5 C16 27.5 2 18 2 9.5 C2 4.5 5.7 1.5 9.8 1.5 C12.7 1.5 14.9 3.1 16 5.4 C17.1 3.1 19.3 1.5 22.2 1.5 C26.3 1.5 30 4.5 30 9.5 C30 18 16 27.5 16 27.5 Z" fill="none" stroke="#ff3b3b" stroke-width="1.6"/>
    </svg>
    <canvas id="fireworks"></canvas>
    <div class="loveText">دوست دارم</div>
  </div>

  <div id="messagesLayer"></div>
  <div id="hint">برای چرخوندن قلب، انگشتت رو روش بکش 💫</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/128/three.min.js"></script>
<script>
/* ================= MESSAGES ================= */
const MESSAGES = [
  "منیم بالام، امیر سنه قوربان ❤️",
  "منیم سوگیلیم دونیامسان 🫀💖",
  "🌹 فدای تو بشم زری خانوم 🫂",
  "🥰 منیم عشقیم کیمدییی؟ 💕",
  "گوگولی بالام کیمدییی؟ 🤗💋",
  "🤍 بغلت تنها جاییه که میتونم آروم بشم 🫂",
  "🌎 دنیای منی ✨",
  "🌬️ نفس من ❤️",
  "نور زندگیم 💛"
];

/* ================= START / AUDIO ================= */
const bgm = document.getElementById('bgm');
const startOverlay = document.getElementById('startOverlay');
document.getElementById('startBtn').addEventListener('click', () => {
  bgm.play().catch(()=>{});
  startOverlay.style.opacity = '0';
  startOverlay.style.transition = 'opacity .6s';
  setTimeout(()=> startOverlay.style.display='none', 600);
  runMessageLoop();
});

/* ================= FIREWORKS (top heart) ================= */
(function(){
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  function resize(){
    const r = canvas.getBoundingClientRect();
    canvas.width = r.width*2; canvas.height = r.height*2;
  }
  resize(); window.addEventListener('resize', resize);
  const colors = ['#ff4fa3','#9d4bff','#ff3b3b','#ff8fcf'];
  let particles = [];
  function spawnBurst(){
    const cx = canvas.width*(0.3+Math.random()*0.4);
    const cy = canvas.height*(0.35+Math.random()*0.3);
    const n = 14+Math.random()*10;
    for(let i=0;i<n;i++){
      const a = (i/n)*Math.PI*2 + Math.random()*0.3;
      const speed = 1.2+Math.random()*2.2;
      particles.push({
        x:cx,y:cy,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed,
        life:1, color:colors[Math.floor(Math.random()*colors.length)],
        size:2+Math.random()*2
      });
    }
  }
  setInterval(spawnBurst, 900);
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.02; p.life-=0.018;
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    particles = particles.filter(p=>p.life>0);
    requestAnimationFrame(tick);
  }
  tick();
})();

/* ================= COMET MESSAGES LOOP ================= */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function showComet(text){
  const layer = document.getElementById('messagesLayer');
  const comet = document.createElement('div');
  comet.className = 'comet';
  const startX = -5, startY = 15 + Math.random()*20;
  const endX = 50 + (Math.random()*10-5), endY = 38 + (Math.random()*8-4);
  comet.style.left = startX+'vw';
  comet.style.top = startY+'vh';
  layer.appendChild(comet);

  await sleep(50);
  comet.style.opacity = '1';
  comet.style.left = endX+'vw';
  comet.style.top = endY+'vh';

  await sleep(2700);

  const bubble = document.createElement('div');
  bubble.className = 'comet-bubble';
  bubble.style.left = '50%';
  bubble.style.top = (endY+8)+'vh';
  bubble.textContent = text;
  layer.appendChild(bubble);
  await sleep(30);
  bubble.classList.add('show');

  await sleep(2800);
  bubble.classList.remove('show');

  comet.style.opacity = '0';
  comet.style.left = '108vw';
  comet.style.top = (endY-25)+'vh';

  await sleep(900);
  bubble.remove();
  comet.remove();
}

async function runMessageLoop(){
  let i = 0;
  while(true){
    await showComet(MESSAGES[i]);
    i = (i+1) % MESSAGES.length;
    await sleep(500);
  }
}

/* ================= THREE.JS GALAXY + HEART ================= */
const canvas = document.getElementById('galaxy');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0,0,9);

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* soft glow sprite texture */
function makeGlowTexture(){
  const size = 128;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.35,'rgba(255,255,255,0.7)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
const glowTex = makeGlowTexture();

/* ---------- galaxy ---------- */
const galaxyGroup = new THREE.Group();
scene.add(galaxyGroup);

(function buildGalaxy(){
  const count = 9000, radius = 6.5, branches = 5, spin = 1.3, randomness = 0.55, randomnessPower = 3;
  const positions = new Float32Array(count*3);
  const colors = new Float32Array(count*3);
  const col = new THREE.Color();
  for(let i=0;i<count;i++){
    const i3 = i*3;
    const r = Math.pow(Math.random(), 0.6) * radius;
    const spinAngle = r*spin;
    const branchAngle = (i % branches)/branches * Math.PI*2;
    const rx = Math.pow(Math.random(),randomnessPower)*(Math.random()<0.5?1:-1)*randomness*r;
    const ry = Math.pow(Math.random(),randomnessPower)*(Math.random()<0.5?1:-1)*randomness*r;
    const rz = Math.pow(Math.random(),randomnessPower)*(Math.random()<0.5?1:-1)*randomness*r*0.35;
    positions[i3]   = Math.cos(branchAngle+spinAngle)*r + rx;
    positions[i3+1] = Math.sin(branchAngle+spinAngle)*r + ry;
    positions[i3+2] = rz;

    const hue = ((branchAngle/(Math.PI*2)) + (r/radius)*0.4 + 0.0) % 1;
    col.setHSL(hue, 0.85, THREE.MathUtils.lerp(0.35,0.75, r/radius));
    colors[i3]=col.r; colors[i3+1]=col.g; colors[i3+2]=col.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size:0.055, sizeAttenuation:true, vertexColors:true,
    map:glowTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  galaxyGroup.add(new THREE.Points(geo, mat));
})();

/* ---------- heart group (scattered points + dense "Z") ---------- */
const heartGroup = new THREE.Group();
heartGroup.scale.set(0.62,0.62,0.62); // smaller than galaxy
scene.add(heartGroup);

function heartCurve(t){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return {x: x/16, y: y/16}; // normalize roughly to [-1,1.05]
}

function buildScatteredHeart(){
  const count = 1100;
  const positions = new Float32Array(count*3);
  const colors = new Float32Array(count*3);
  const col = new THREE.Color();
  for(let i=0;i<count;i++){
    const i3 = i*3;
    const t = Math.random()*Math.PI*2;
    const base = heartCurve(t);
    const scatter = 1 + (Math.random()-0.5)*0.5; // پراکنده اطراف خط قلب
    let x = base.x*scatter;
    let y = base.y*scatter;
    x += (Math.random()-0.5)*0.12;
    y += (Math.random()-0.5)*0.12;
    const z = (Math.random()-0.5)*0.5;
    positions[i3]=x; positions[i3+1]=y; positions[i3+2]=z;

    const l = 0.55+Math.random()*0.3;
    col.setHSL(0.93+Math.random()*0.03, 0.95, l); // صورتی نورانی
    colors[i3]=col.r; colors[i3+1]=col.g; colors[i3+2]=col.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size:0.05, sizeAttenuation:true, vertexColors:true,
    map:glowTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  return new THREE.Points(geo, mat);
}

async function buildZText(){
  if(document.fonts && document.fonts.load){
    try{ await document.fonts.load("700 200px Pacifico"); await document.fonts.ready; }catch(e){}
  }
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,size,size);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = "700 190px 'Pacifico', cursive";
  ctx.fillText('Z', size/2, size/2+10);
  const data = ctx.getImageData(0,0,size,size).data;

  const pts = [];
  const step = 2.4;
  for(let y=0;y<size;y+=step){
    for(let x=0;x<size;x+=step){
      const idx = (Math.floor(y)*size+Math.floor(x))*4;
      if(data[idx+3] > 120){
        pts.push({
          x:(x/size - 0.5)*1.05,
          y:-(y/size - 0.5)*1.05 + 0.12,
        });
      }
    }
  }
  const count = pts.length;
  const positions = new Float32Array(count*3);
  const colors = new Float32Array(count*3);
  const col = new THREE.Color();
  for(let i=0;i<count;i++){
    const i3=i*3;
    positions[i3] = pts[i].x + (Math.random()-0.5)*0.02;
    positions[i3+1] = pts[i].y + (Math.random()-0.5)*0.02;
    positions[i3+2] = (Math.random()-0.5)*0.18;
    const l = 0.7+Math.random()*0.3;
    col.setHSL(0.95+Math.random()*0.05, 0.5, l); // صورتی روشن تا سفید، متراکم
    colors[i3]=col.r; colors[i3+1]=col.g; colors[i3+2]=col.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size:0.034, sizeAttenuation:true, vertexColors:true,
    map:glowTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  });
  return new THREE.Points(geo, mat);
}

heartGroup.add(buildScatteredHeart());
buildZText().then(mesh => heartGroup.add(mesh));

/* ---------- touch / drag rotation for the heart ---------- */
let isDragging = false;
let lastX = 0, lastY = 0;
let velX = 0, velY = 0;
let lastInteraction = performance.now();

function pointerDown(e){
  isDragging = true;
  const p = e.touches ? e.touches[0] : e;
  lastX = p.clientX; lastY = p.clientY;
  lastInteraction = performance.now();
}
function pointerMove(e){
  if(!isDragging) return;
  const p = e.touches ? e.touches[0] : e;
  const dx = p.clientX - lastX;
  const dy = p.clientY - lastY;
  lastX = p.clientX; lastY = p.clientY;
  velY = dx*0.006;
  velX = dy*0.006;
  heartGroup.rotation.y += velY;
  heartGroup.rotation.x += velX;
  lastInteraction = performance.now();
}
function pointerUp(){ isDragging = false; }

canvas.addEventListener('mousedown', pointerDown);
canvas.addEventListener('mousemove', pointerMove);
window.addEventListener('mouseup', pointerUp);
canvas.addEventListener('touchstart', pointerDown, {passive:true});
canvas.addEventListener('touchmove', pointerMove, {passive:true});
canvas.addEventListener('touchend', pointerUp);

/* ---------- animation loop ---------- */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  galaxyGroup.rotation.z += 0.0009;

  if(!isDragging){
    velX *= 0.94; velY *= 0.94;
    heartGroup.rotation.x += velX;
    heartGroup.rotation.y += velY;
    if(performance.now() - lastInteraction > 1800){
      heartGroup.rotation.y += 0.0035;
    }
  }

  camera.position.x = Math.sin(t*0.06)*1.0;
  camera.position.y = Math.cos(t*0.05)*0.5;
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}
animate();
</script>
