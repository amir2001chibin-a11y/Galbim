<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>برای زری خانوم 💖</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#000;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
  }
  #scene-canvas { position:fixed; top:0; left:0; width:100%; height:100%; display:block; z-index:1; }

  /* ---------- Neon decorative background layer ---------- */
  #neon-bg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:0; pointer-events:none; overflow:hidden;
  }
  .neon-line {
    position:absolute;
    filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 14px currentColor);
    opacity:0.55;
    animation: neonCycle 8s linear infinite, floatAround linear infinite;
  }
  @keyframes neonCycle {
    0%   { color:#ff3df0; }
    20%  { color:#a259ff; }
    40%  { color:#33e0ff; }
    60%  { color:#ff5fa2; }
    80%  { color:#7c4dff; }
    100% { color:#ff3df0; }
  }
  @keyframes floatAround {
    from { transform: translate(0,0) rotate(0deg); }
    to   { transform: translate(0,0) rotate(360deg); }
  }
  .comet-heart {
    position:absolute;
    opacity:0.8;
    filter: drop-shadow(0 0 8px #ffd84d) drop-shadow(0 0 18px #ffd84d);
  }

  /* ---------- Top "I Love You" banner ---------- */
  #love-banner {
    position:fixed; top:18px; left:0; width:100%;
    text-align:center; z-index:5; pointer-events:none;
  }
  #love-svg { width:min(90vw,420px); height:auto; }
  .love-heart-outline {
    fill:none;
    stroke:#ff1744;
    stroke-width:3.5;
    filter: drop-shadow(0 0 6px #ff1744) drop-shadow(0 0 16px #ff1744) drop-shadow(0 0 28px #ff4f7a);
    animation: pulseGlow 2.2s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { filter: drop-shadow(0 0 6px #ff1744) drop-shadow(0 0 16px #ff1744) drop-shadow(0 0 28px #ff4f7a); }
    50% { filter: drop-shadow(0 0 12px #ff1744) drop-shadow(0 0 26px #ff1744) drop-shadow(0 0 42px #ff4f7a); }
  }
  .fw-particle { opacity:0; }

  /* ---------- Message comet area ---------- */
  #message-layer {
    position:fixed; bottom:0; left:0; width:100%; height:42%;
    z-index:4; pointer-events:none; overflow:hidden;
  }
  .msg-comet {
    position:absolute;
    display:flex; align-items:center; gap:10px;
    white-space:nowrap;
  }
  .msg-star {
    width:14px; height:14px; border-radius:50%;
    background: radial-gradient(circle, #fff 0%, #ffd84d 40%, transparent 75%);
    box-shadow: 0 0 12px 4px #ffd84d, 0 0 24px 10px #ff7eb3;
    flex-shrink:0;
  }
  .msg-tail {
    position:absolute;
    height:2px;
    background: linear-gradient(to left, rgba(255,216,77,0.9), transparent);
    border-radius:2px;
    top:50%; transform:translateY(-50%);
    right:14px;
  }
  .msg-text {
    font-size: clamp(15px, 4vw, 24px);
    font-weight:600;
    color:#fff;
    background: linear-gradient(135deg, rgba(255,77,166,0.18), rgba(124,77,255,0.18));
    border:1px solid rgba(255,255,255,0.25);
    padding:8px 18px;
    border-radius:30px;
    backdrop-filter: blur(4px);
    text-shadow: 0 0 8px rgba(255,182,219,0.9), 0 0 18px rgba(255,77,166,0.6);
    box-shadow: 0 0 18px rgba(255,77,166,0.45);
    opacity:0;
    transform: scale(0.3);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .msg-text.show {
    opacity:1;
    transform: scale(1);
  }

  /* ---------- Play heart button ---------- */
  #play-heart {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:64px; height:58px;
    z-index:10;
    cursor:pointer;
    background:none; border:none;
    filter: drop-shadow(0 0 10px #ff5fa2) drop-shadow(0 0 22px #ff1744);
    animation: heartBeat 1.3s ease-in-out infinite;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #play-heart.hidden {
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  @keyframes heartBeat {
    0%,100% { transform:translate(-50%,-50%) scale(1); }
    15% { transform:translate(-50%,-50%) scale(1.15); }
    30% { transform:translate(-50%,-50%) scale(1); }
  }
  #play-hint {
    position:fixed; top:calc(50% + 42px); left:50%; transform:translateX(-50%);
    color:#ffd9e6; font-size:13px; letter-spacing:0.5px;
    text-shadow:0 0 8px rgba(255,95,162,0.8);
    z-index:10; white-space:nowrap;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  #play-hint.hidden { opacity:0; visibility:hidden; }

  /* ---------- Touch particle canvas ---------- */
  #touch-canvas {
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:6; pointer-events:none;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .neon-line, .comet-heart, #play-heart { animation:none !important; }
  }
</style>
</head>
<body>

<div id="neon-bg"></div>
<canvas id="scene-canvas"></canvas>
<canvas id="touch-canvas"></canvas>

<div id="love-banner">
  <svg id="love-svg" viewBox="0 0 200 90">
    <defs>
      <clipPath id="heartClip">
        <path d="M100,80 C100,80 20,35 20,5 C20,-12 45,-12 55,5 C65,-12 90,-12 100,5
                 C90,-12 115,-12 125,5 C135,-12 160,-12 160,5 C160,35 100,80 100,80 Z"/>
      </clipPath>
    </defs>
    <!-- fireworks clipped inside heart -->
    <g clip-path="url(#heartClip)" id="fw-group"></g>
    <!-- outline -->
    <path class="love-heart-outline"
      d="M100,80 C100,80 20,35 20,5 C20,-12 45,-12 55,5 C65,-12 90,-12 100,5
         C90,-12 115,-12 125,5 C135,-12 160,-12 160,5 C160,35 100,80 100,80 Z"/>
  </svg>
</div>

<button id="play-heart" aria-label="پخش آهنگ">
  <svg viewBox="0 0 64 58" width="64" height="58">
    <path fill="#ff1744" d="M32,54 C32,54 4,32 4,14 C4,2 14,-2 22,4 C27,-3 37,-3 42,4 C50,-2 60,2 60,14 C60,32 32,54 32,54 Z"/>
  </svg>
</button>
<div id="play-hint">برای پخش آهنگ، قلب رو لمس کن 💗</div>

<div id="message-layer"></div>

<audio id="bg-audio" loop preload="auto">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =====================================================================
   ROMANTIC 3D GALAXY HEART — main script
   ===================================================================== */

/* ---------------------------------------------------------------------
   1) THREE.JS SCENE SETUP
   --------------------------------------------------------------------- */
const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(62, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.set(0, 0, 34);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* A group that holds everything we want to slowly rotate together (galaxy) */
const galaxyGroup = new THREE.Group();
scene.add(galaxyGroup);

/* A separate group for the heart so it can be rotated independently by touch/drag */
const heartGroup = new THREE.Group();
scene.add(heartGroup);

/* ---------------------------------------------------------------------
   2) GALAXY — multicolor cosmic point cloud (spiral distribution)
   --------------------------------------------------------------------- */
function buildGalaxy() {
  const count = 14000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  const colorInner = new THREE.Color('#ff6bd6'); // pink-magenta core
  const colorMid   = new THREE.Color('#7c4dff'); // purple
  const colorOuter = new THREE.Color('#33e0ff'); // cyan
  const colorEdge  = new THREE.Color('#ffd84d'); // gold sparks

  const radius = 24;
  const branches = 5;
  const spin = 1.6;
  const randomness = 0.45;

  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const r = Math.pow(Math.random(), 1.4) * radius;
    const branchAngle = (i % branches) / branches * Math.PI * 2;
    const spinAngle = r * spin;

    const randX = (Math.random() - 0.5) * randomness * r * 0.5;
    const randY = (Math.random() - 0.5) * randomness * 0.6;
    const randZ = (Math.random() - 0.5) * randomness * r * 0.5;

    const angle = branchAngle + spinAngle;
    positions[i3]     = Math.cos(angle) * r + randX;
    positions[i3 + 1] = randY * 2.2;
    positions[i3 + 2] = Math.sin(angle) * r + randZ;

    // color mix based on radius + a little hue variety for a "cosmic" feel
    let mixed;
    const t = r / radius;
    if (t < 0.33) mixed = colorInner.clone().lerp(colorMid, t/0.33);
    else if (t < 0.66) mixed = colorMid.clone().lerp(colorOuter, (t-0.33)/0.33);
    else mixed = colorOuter.clone().lerp(colorEdge, (t-0.66)/0.34);

    // sprinkle some random gold/pink sparks
    if (Math.random() < 0.06) mixed = colorEdge.clone();
    if (Math.random() < 0.04) mixed = colorInner.clone();

    colors[i3] = mixed.r;
    colors[i3+1] = mixed.g;
    colors[i3+2] = mixed.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.16,
    sizeAttenuation: true,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const points = new THREE.Points(geo, mat);
  galaxyGroup.add(points);

  // distant starfield (small white/blue specks far out, static)
  const farCount = 3000;
  const farPos = new Float32Array(farCount*3);
  for (let i=0;i<farCount;i++){
    const i3=i*3;
    const r = 60 + Math.random()*120;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*2)-1);
    farPos[i3]   = r*Math.sin(phi)*Math.cos(theta);
    farPos[i3+1] = r*Math.sin(phi)*Math.sin(theta);
    farPos[i3+2] = r*Math.cos(phi);
  }
  const farGeo = new THREE.BufferGeometry();
  farGeo.setAttribute('position', new THREE.BufferAttribute(farPos,3));
  const farMat = new THREE.PointsMaterial({
    size:0.5, color:0xbfd9ff, transparent:true, opacity:0.55,
    depthWrite:false, blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(farGeo, farMat));
}
buildGalaxy();

/* ---------------------------------------------------------------------
   3) HEART — dotted/scattered point heart, pink & glowing, smaller scale
   --------------------------------------------------------------------- */

// parametric heart curve (2D), returns {x,y} for t in [0, 2PI]
function heartCurve(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return { x, y };
}

function buildHeart() {
  const scaleFactor = 0.34; // heart smaller than galaxy
  const surfaceCount = 5200;
  const positions = new Float32Array(surfaceCount * 3);
  const colors = new Float32Array(surfaceCount * 3);

  const pink = new THREE.Color('#ff3fa2');
  const hotPink = new THREE.Color('#ff8fd0');

  for (let i = 0; i < surfaceCount; i++) {
    const i3 = i*3;
    const t = Math.random() * Math.PI * 2;
    const { x, y } = heartCurve(t);

    // scatter heart as a filled, slightly puffy 3D blob (not flat outline)
    const fill = Math.pow(Math.random(), 0.5); // bias towards edge for nicer density falloff
    const sx = x * fill;
    const sy = y * fill;
    const sz = (Math.random() - 0.5) * 5 * (1-fill*0.4);

    // jitter for "dotted/scattered" look
    const jitter = 0.5;
    positions[i3]   = sx * scaleFactor + (Math.random()-0.5)*jitter;
    positions[i3+1] = sy * scaleFactor + (Math.random()-0.5)*jitter;
    positions[i3+2] = sz * scaleFactor + (Math.random()-0.5)*jitter;

    const c = pink.clone().lerp(hotPink, Math.random());
    colors[i3]=c.r; colors[i3+1]=c.g; colors[i3+2]=c.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));

  const mat = new THREE.PointsMaterial({
    size: 0.22,
    vertexColors: true,
    transparent:true,
    opacity:0.95,
    depthWrite:false,
    blending: THREE.AdditiveBlending
  });

  const heartPoints = new THREE.Points(geo, mat);
  heartGroup.add(heartPoints);

  // soft glow sprite behind the heart
  const glowTex = makeRadialGlowTexture('#ff3fa2');
  const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent:true, opacity:0.5, depthWrite:false, blending: THREE.AdditiveBlending });
  const glow = new THREE.Sprite(glowMat);
  glow.scale.set(20,20,1);
  glow.position.z = -1;
  heartGroup.add(glow);

  buildLetterZ(scaleFactor);
}

function makeRadialGlowTexture(hexColor) {
  const size = 256;
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext('2d');
  const grad = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0, hexColor + 'ff');
  grad.addColorStop(0.4, hexColor + '88');
  grad.addColorStop(1, hexColor + '00');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,size,size);
  const tex = new THREE.CanvasTexture(cnv);
  return tex;
}

/* Dense dotted "Z" rendered in a pretty script font, sampled from canvas pixels,
   placed in the center of the heart, much denser than the heart points. */
function buildLetterZ(heartScale) {
  const res = 220;
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = res;
  const ctx = cnv.getContext('2d');
  ctx.clearRect(0,0,res,res);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `italic 700 ${res*0.62}px "Brush Script MT", "Segoe Script", cursive, serif`;
  ctx.fillText('Z', res/2, res/2 + res*0.05);

  const imgData = ctx.getImageData(0,0,res,res).data;
  const pts = [];
  for (let y=0; y<res; y+=1) {
    for (let x=0; x<res; x+=1) {
      const idx = (y*res + x) * 4;
      const alpha = imgData[idx+3];
      if (alpha > 90) {
        // normalize to -1..1 space then scale small (center of heart)
        const nx = (x/res - 0.5) * 2;
        const ny = -(y/res - 0.5) * 2;
        pts.push([nx, ny]);
      }
    }
  }

  // Build dense points, multiple samples per pixel for extra density
  const perPixel = 3;
  const total = pts.length * perPixel;
  const positions = new Float32Array(total*3);
  const colors = new Float32Array(total*3);
  const zColor = new THREE.Color('#ffffff');
  const zColor2 = new THREE.Color('#ffd9ec');

  const letterScale = 4.2 * heartScale * 3.1; // sized to sit inside heart center
  let p = 0;
  for (let i=0;i<pts.length;i++){
    for (let k=0;k<perPixel;k++){
      const jitter = 0.018;
      const x = pts[i][0]*letterScale + (Math.random()-0.5)*jitter*letterScale;
      const y = pts[i][1]*letterScale + (Math.random()-0.5)*jitter*letterScale;
      const z = (Math.random()-0.5)*0.6;
      positions[p*3]=x; positions[p*3+1]=y; positions[p*3+2]=z;
      const c = zColor.clone().lerp(zColor2, Math.random());
      colors[p*3]=c.r; colors[p*3+1]=c.g; colors[p*3+2]=c.b;
      p++;
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  const mat = new THREE.PointsMaterial({
    size:0.16, vertexColors:true, transparent:true, opacity:1,
    depthWrite:false, blending: THREE.AdditiveBlending
  });
  const zPoints = new THREE.Points(geo, mat);
  zPoints.position.z = 1.2; // slightly in front of heart
  heartGroup.add(zPoints);
}

buildHeart();

/* ---------------------------------------------------------------------
   4) INTERACTION — drag to rotate the heart (and lightly the galaxy)
   --------------------------------------------------------------------- */
let isDragging = false;
let prevX = 0, prevY = 0;
let velX = 0, velY = 0; // inertia

function onPointerDown(x,y){ isDragging = true; prevX = x; prevY = y; }
function onPointerMove(x,y){
  if (!isDragging) return;
  const dx = x - prevX;
  const dy = y - prevY;
  velY = dx * 0.005;
  velX = dy * 0.005;
  heartGroup.rotation.y += velY;
  heartGroup.rotation.x += velX;
  prevX = x; prevY = y;
}
function onPointerUp(){ isDragging = false; }

canvas.addEventListener('mousedown', e => onPointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => onPointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', onPointerUp);

canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  onPointerDown(t.clientX, t.clientY);
}, {passive:true});
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  onPointerMove(t.clientX, t.clientY);
}, {passive:true});
window.addEventListener('touchend', onPointerUp);

/* ---------------------------------------------------------------------
   5) ANIMATION LOOP
   --------------------------------------------------------------------- */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // galaxy slow ambient rotation
  galaxyGroup.rotation.y = t * 0.04;

  // heart gentle auto-rotation + inertia from drag, with damping
  if (!isDragging) {
    heartGroup.rotation.y += velY;
    heartGroup.rotation.x += velX;
    velY *= 0.94;
    velX *= 0.94;
    heartGroup.rotation.y += 0.0025; // slow default spin
  }

  // gentle heartbeat pulse scale
  const pulse = 1 + Math.sin(t*2.4)*0.035;
  heartGroup.scale.set(pulse, pulse, pulse);

  renderer.render(scene, camera);
}
animate();

/* =====================================================================
   6) NEON BACKGROUND DECOR — roses, hearts, comet-hearts (CSS/SVG layer)
   ===================================================================== */
const neonBg = document.getElementById('neon-bg');

const ROSE_PATH = "M50,90 C20,70 10,40 30,25 C20,15 30,0 45,8 C50,0 60,0 60,12 C75,2 90,18 75,30 C95,40 85,68 50,90 Z M50,90 L50,130";
const HEART_PATH = "M50,90 C50,90 5,55 5,25 C5,5 25,-5 40,8 C45,-5 65,-5 70,8 C85,-5 95,5 95,25 C95,55 50,90 50,90 Z";

function rand(min,max){ return Math.random()*(max-min)+min; }

function createNeonLine(svgPath, sizePx) {
  const wrapper = document.createElement('div');
  wrapper.className = 'neon-line';
  const top = rand(0,90);
  const left = rand(0,85);
  wrapper.style.top = top + 'vh';
  wrapper.style.left = left + 'vw';
  wrapper.style.animationDuration = rand(6,11) + 's, ' + rand(30,70) + 's';
  wrapper.style.animationDelay = rand(-8,0) + 's, ' + rand(-30,0) + 's';

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', sizePx);
  svg.setAttribute('height', sizePx);
  svg.setAttribute('viewBox', '0 0 100 130');
  const path = document.createElementNS(svgNS, 'path');
  path.setAttribute('d', svgPath);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', 'currentColor');
  path.setAttribute('stroke-width', '2.4');
  svg.appendChild(path);
  wrapper.appendChild(svg);
  neonBg.appendChild(wrapper);
}

// Sprinkle roses and hearts across background, varied sizes
for (let i=0;i<7;i++) createNeonLine(ROSE_PATH, rand(40,80));
for (let i=0;i<6;i++) createNeonLine(HEART_PATH, rand(30,60));

/* Yellow comet-hearts that loop/orbit around the screen */
function createCometHeart(i) {
  const el = document.createElement('div');
  el.className = 'comet-heart';
  const size = rand(22,38);
  el.style.width = size+'px';
  el.style.height = size+'px';
  const svgNS='http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox','0 0 100 130');
  svg.setAttribute('width','100%');
  svg.setAttribute('height','100%');
  const path = document.createElementNS(svgNS,'path');
  path.setAttribute('d', HEART_PATH);
  path.setAttribute('fill','none');
  path.setAttribute('stroke','#ffd84d');
  path.setAttribute('stroke-width','3');
  svg.appendChild(path);
  el.appendChild(svg);
  neonBg.appendChild(el);

  // orbit animation via JS (circular path around screen, looping)
  const cx = rand(20,80), cy = rand(20,80);
  const radius = rand(15,40);
  const speed = rand(0.15,0.3);
  const phase = rand(0, Math.PI*2);
  el.dataset.cx = cx; el.dataset.cy = cy; el.dataset.radius = radius;
  el.dataset.speed = speed; el.dataset.phase = phase;
  return el;
}
const cometHearts = [];
for (let i=0;i<5;i++) cometHearts.push(createCometHeart(i));

function animateComets(timestamp) {
  const t = timestamp * 0.001;
  cometHearts.forEach(el => {
    const cx = parseFloat(el.dataset.cx);
    const cy = parseFloat(el.dataset.cy);
    const radius = parseFloat(el.dataset.radius);
    const speed = parseFloat(el.dataset.speed);
    const phase = parseFloat(el.dataset.phase);
    const angle = t*speed + phase;
    const x = cx + Math.cos(angle)*radius;
    const y = cy + Math.sin(angle)*radius*0.6;
    el.style.left = x + 'vw';
    el.style.top = y + 'vh';
    el.style.transform = `rotate(${angle*40}deg)`;
  });
  requestAnimationFrame(animateComets);
}
requestAnimationFrame(animateComets);

/* =====================================================================
   7) TOP "I LOVE YOU" HEART — fireworks inside (pink/purple/red)
   ===================================================================== */
const fwGroup = document.getElementById('fw-group');
const fwColors = ['#ff3df0','#a259ff','#ff1744','#ff7eb3','#c14dff'];

function spawnFirework() {
  const cx = rand(60,140);
  const cy = rand(10,55);
  const particleCount = 10;
  for (let i=0;i<particleCount;i++){
    const angle = (Math.PI*2/particleCount)*i + rand(-0.2,0.2);
    const dist = rand(8,22);
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', rand(1,2.2));
    const color = fwColors[Math.floor(Math.random()*fwColors.length)];
    circle.setAttribute('fill', color);
    circle.classList.add('fw-particle');
    fwGroup.appendChild(circle);

    const duration = rand(700,1100);
    const start = performance.now();
    function step(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed/duration, 1);
      const ease = 1 - Math.pow(1-progress, 2);
      circle.setAttribute('cx', cx + dx*ease);
      circle.setAttribute('cy', cy + dy*ease);
      circle.style.opacity = (1-progress);
      if (progress < 1) requestAnimationFrame(step);
      else circle.remove();
    }
    requestAnimationFrame(step);
  }
}
setInterval(spawnFirework, 450);
spawnFirework();

/* =====================================================================
   8) MESSAGE COMETS — looping queue of romantic messages
   ===================================================================== */
const messages = [
  "منیم بالام، امیر سنه قوربان ❤️",
  "منیم سوگیلیم دونیامسان 🫀💖",
  "🌹 فدای تو بشم زری خانوم 🫂",
  "🥰 منیم عشقیم کیمدییی؟ 💕",
  "گوگولی بالام کیمدییی؟ 🤗💋",
  "🤍 بغلت تنها جاییه که میتونم آروم بشم 🫂",
  "🌎 دنیای منی ✨",
  "🌬️ نفس من ❤️",
  "نور زندگیم 💛"
];

const messageLayer = document.getElementById('message-layer');
let msgIndex = 0;

function showNextMessage() {
  const text = messages[msgIndex % messages.length];
  msgIndex++;

  const comet = document.createElement('div');
  comet.className = 'msg-comet';
  const startX = rand(10, 70); // vw
  const startY = rand(5, 75);  // % of message-layer height
  comet.style.left = startX + 'vw';
  comet.style.top = startY + '%';

  const star = document.createElement('div');
  star.className = 'msg-star';
  const tail = document.createElement('div');
  tail.className = 'msg-tail';
  tail.style.width = '70px';

  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  textEl.textContent = text;

  comet.appendChild(textEl);
  comet.appendChild(star);
  comet.appendChild(tail);
  messageLayer.appendChild(comet);

  // Phase 1: comet flies in across the screen (like a shooting star)
  const travelDistance = rand(90, 130);
  comet.style.transform = `translateX(${travelDistance}vw)`;
  comet.style.transition = 'transform 1.1s ease-out';
  requestAnimationFrame(() => {
    comet.style.transform = `translateX(${-travelDistance*0.15}vw)`;
  });

  // Phase 2: after comet arrives, "open" and reveal message text
  setTimeout(() => {
    star.style.transition = 'opacity 0.4s ease';
    star.style.opacity = '0.15';
    tail.style.transition = 'opacity 0.4s ease';
    tail.style.opacity = '0';
    textEl.classList.add('show');
  }, 950);

  // Phase 3: message lingers, then fades out and element is removed
  setTimeout(() => {
    textEl.classList.remove('show');
    comet.style.transition = 'opacity 0.6s ease';
    comet.style.opacity = '0';
  }, 3600);

  setTimeout(() => {
    comet.remove();
  }, 4300);
}

// Loop: show a new message comet every ~4.2s, forever
showNextMessage();
setInterval(showNextMessage, 4200);

/* =====================================================================
   10) TOUCH PARTICLE EFFECT — sparkles wherever the user touches/clicks
   ===================================================================== */
const touchCanvas = document.getElementById('touch-canvas');
const tctx = touchCanvas.getContext('2d');
function resizeTouchCanvas(){
  touchCanvas.width = window.innerWidth;
  touchCanvas.height = window.innerHeight;
}
resizeTouchCanvas();
window.addEventListener('resize', resizeTouchCanvas);

const sparkles = [];
const sparkleColors = ['#ff7eb3','#ffd84d','#a259ff','#33e0ff','#ff3df0'];

function spawnSparkles(x,y) {
  const count = 12;
  for (let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = rand(1,4);
    sparkles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 1,
      size: rand(1.5,3.5),
      color: sparkleColors[Math.floor(Math.random()*sparkleColors.length)]
    });
  }
}

function handleTouch(x,y){ spawnSparkles(x,y); }
window.addEventListener('mousedown', e => handleTouch(e.clientX, e.clientY));
window.addEventListener('touchstart', e => {
  for (const t of e.touches) handleTouch(t.clientX, t.clientY);
}, {passive:true});
window.addEventListener('touchmove', e => {
  for (const t of e.touches) handleTouch(t.clientX, t.clientY);
}, {passive:true});

function renderSparkles() {
  tctx.clearRect(0,0,touchCanvas.width, touchCanvas.height);
  for (let i = sparkles.length-1; i>=0; i--) {
    const s = sparkles[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.03; // slight gravity drift
    s.life -= 0.02;
    if (s.life <= 0) { sparkles.splice(i,1); continue; }
    tctx.globalAlpha = Math.max(s.life,0);
    tctx.beginPath();
    tctx.fillStyle = s.color;
    tctx.shadowColor = s.color;
    tctx.shadowBlur = 8;
    tctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    tctx.fill();
  }
  tctx.globalAlpha = 1;
  requestAnimationFrame(renderSparkles);
}
renderSparkles();
